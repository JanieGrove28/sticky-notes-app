{% extends 'notes/base.html' %}

{% block content %}

<div class="page">

    <h1>Delete Note</h1>

    <form method="POST">
        {% csrf_token %}
        <p>Are you sure you want to delete "{{ note.title }}"?</p>

        <div style="text-align:center;">
            <button class="btn" type="submit">Yes Delete</button>
        </div>
    </form>

</div>

{% endblock %}
